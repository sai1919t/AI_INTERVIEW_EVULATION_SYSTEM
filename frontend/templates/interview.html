<!DOCTYPE html>
<html>
<head>
    <title>AI Interview</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
        }

        .interview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .question-box {
            font-size: 22px;
            margin-bottom: 30px;
            max-width: 800px;
        }

        .video-box {
            border: 4px solid #6366f1;
            border-radius: 15px;
            overflow: hidden;
            width: 500px;
            height: 350px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .next-btn {
            margin-top: 30px;
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #6366f1;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .next-btn:hover {
            transform: scale(1.05);
        }

    </style>
</head>

<body>

<div class="interview-container">

    <!-- QUESTION -->
    <div class="question-box" id="questionBox"></div>

    <!-- WEBCAM -->
    <div class="video-box">
        <video id="preview" autoplay muted></video>
    </div>

    <!-- NEXT BUTTON -->
    <button id="nextBtn" class="next-btn">Next Question</button>

</div>

<script type="text/javascript">

const questionsData = JSON.parse('{{ questions | tojson | safe }}');
let currentQuestionIndex = 0;

let mediaRecorder;
let fullSessionChunks = [];
let allTranscripts = [];

let recognition;
let currentTranscript = "";

const questionBox = document.getElementById("questionBox");
const preview = document.getElementById("preview");
const nextBtn = document.getElementById("nextBtn");

// ================= CAMERA =================
async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: true
    });

    preview.srcObject = stream;

    mediaRecorder = new MediaRecorder(stream, {
        mimeType: "video/webm; codecs=vp8,opus"
    });

    mediaRecorder.ondataavailable = function(event) {
        if (event.data.size > 0) {
            fullSessionChunks.push(event.data);
        }
    };

    mediaRecorder.start();
}

// ================= SPEECH =================
function startSpeechRecognition() {

    const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        alert("Use Chrome browser for speech recognition.");
        return;
    }

    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;

    currentTranscript = "";

    recognition.onresult = function(event) {

        let transcript = "";

        for (let i = event.resultIndex; i < event.results.length; ++i) {
            transcript += event.results[i][0].transcript;
        }

        currentTranscript = transcript;
    };

    recognition.start();
}

// ================= SHOW QUESTION =================
function showQuestion() {

    if (currentQuestionIndex < questionsData.length) {

        questionBox.innerText =
            "Question " + (currentQuestionIndex + 1) + ": " +
            questionsData[currentQuestionIndex].question;

        startSpeechRecognition();

    } else {
        submitInterview();
    }
}

// ================= NEXT BUTTON =================
nextBtn.onclick = function() {

    if (recognition) {
        recognition.stop();
    }

    allTranscripts.push(currentTranscript);

    currentQuestionIndex++;

    // 👉 If last question completed
    if (currentQuestionIndex === questionsData.length-1) {

        nextBtn.innerText = "Submit";

    }

    // 👉 If user clicks after last question → submit
    if (currentQuestionIndex > questionsData.length - 1) {

        showLoadingScreen();
        submitInterview();
        return;
    }

    setTimeout(showQuestion, 800);
};

// ================= SUBMIT =================
async function submitInterview() {

    mediaRecorder.stop();

    // ✅ WAIT until recording is fully finished
    mediaRecorder.onstop = async function () {

        const tracks = preview.srcObject.getTracks();
        tracks.forEach(track => track.stop());

        const fullBlob = new Blob(fullSessionChunks, {
            type: "video/webm"
        });

        console.log("Blob size:", fullBlob.size);

        if (fullBlob.size < 1000) {
            alert("Recording failed! Please try again.");
            return;
        }

        const formData = new FormData();

        formData.append("department", "{{ department }}");

        formData.append(
            "full_session_video",
            fullBlob,
            "full_session.webm"
        );

        allTranscripts.forEach((text, index) => {
            formData.append("answer" + (index + 1), text);
        });

        const response = await fetch("/submit", {
            method: "POST",
            body: formData
        });

        const html = await response.text();
        document.open();
        document.write(html);
        document.close();
    };
}
function showLoadingScreen() {

    preview.style.display = "none";

    const loadingDiv = document.createElement("div");

    loadingDiv.style.width = "400px";
    loadingDiv.style.height = "300px";
    loadingDiv.style.display = "flex";
    loadingDiv.style.justifyContent = "center";
    loadingDiv.style.alignItems = "center";
    loadingDiv.style.background = "#1e293b";
    loadingDiv.style.color = "white";
    loadingDiv.style.fontSize = "20px";
    loadingDiv.style.borderRadius = "10px";
    loadingDiv.style.animation = "fadeIn 1s ease-in-out";

    loadingDiv.innerText = "⏳ Results are loading...";

    preview.parentNode.appendChild(loadingDiv);

    questionBox.innerText = "Analyzing your interview...";
    nextBtn.style.display = "none";
}
// ================= INIT =================
async function initInterview() {
    await startCamera();
    showQuestion();
}

initInterview();

</script>

</body>
</html>
